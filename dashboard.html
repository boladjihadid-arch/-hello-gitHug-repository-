<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvestPro — Tableau de bord</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--dark:#0D0D0D;--dark2:#181818;--dark3:#242424;--text:#F5F0E8;--muted:#9E9A90;--green:#2ECC71;--red:#E74C3C;--blue:#3498DB;--orange:#E67E22}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh}

#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.login-box{background:var(--dark2);border:1px solid #2a2a2a;border-radius:16px;padding:2.5rem;width:100%;max-width:400px}
.login-logo{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--gold);text-align:center;margin-bottom:0.3rem}
.login-sub{text-align:center;font-size:0.83rem;color:var(--muted);margin-bottom:2rem}
.login-tabs{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:1.8rem}
.ltab{padding:0.6rem;border-radius:8px;font-size:0.85rem;cursor:pointer;text-align:center;border:1px solid #333;color:var(--muted);transition:all 0.2s;font-family:'DM Sans',sans-serif;background:none}
.ltab.active{background:var(--gold);color:var(--dark);border-color:var(--gold);font-weight:500}
.inp{width:100%;background:var(--dark3);border:1px solid #333;color:var(--text);padding:0.75rem 1rem;border-radius:8px;font-size:0.9rem;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:1rem}
.inp:focus{border-color:var(--gold)}
.btn-gold{width:100%;background:var(--gold);color:var(--dark);border:none;padding:0.85rem;border-radius:8px;font-size:0.95rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-gold:hover{background:#d4b055}
.demo-hint{font-size:0.75rem;color:var(--muted);text-align:center;margin-top:1rem}
.demo-hint strong{color:var(--gold)}

#appScreen{display:none;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;background:var(--dark2);border-bottom:1px solid #222;position:sticky;top:0;z-index:50}
.topbar-logo{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.2rem;text-decoration:none}
.topbar-right{display:flex;align-items:center;gap:1rem}
.user-badge{display:flex;align-items:center;gap:8px;font-size:0.85rem}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.78rem;font-weight:500}
.role-tag{font-size:0.7rem;padding:2px 8px;border-radius:20px}
.role-admin{background:rgba(231,76,60,0.15);color:var(--red)}
.role-client{background:rgba(201,168,76,0.15);color:var(--gold)}
.btn-logout{background:none;border:1px solid #333;color:var(--muted);padding:4px 12px;border-radius:6px;font-size:0.78rem;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

.tabs{display:flex;border-bottom:1px solid #222;background:var(--dark2);overflow-x:auto}
.tab{padding:0.8rem 1.5rem;font-size:0.85rem;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover{color:var(--text)}
.content{padding:1.5rem;flex:1}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
.stat-card{background:var(--dark2);border:1px solid #2a2a2a;border-radius:10px;padding:1.2rem}
.stat-lbl{font-size:0.72rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:0.5rem}
.stat-val{font-family:'Playfair Display',serif;font-size:1.8rem}
.stat-sub{font-size:0.75rem;margin-top:4px}
.up{color:var(--green)}

.table-card{background:var(--dark2);border:1px solid #2a2a2a;border-radius:12px;overflow:hidden;margin-bottom:1.5rem}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.2rem;border-bottom:1px solid #222;flex-wrap:wrap;gap:0.5rem}
.table-title{font-size:0.9rem;font-weight:500}
.search-inp{background:var(--dark3);border:1px solid #333;color:var(--text);padding:0.4rem 0.8rem;border-radius:6px;font-size:0.82rem;font-family:'DM Sans',sans-serif;outline:none;width:180px}
.search-inp:focus{border-color:var(--gold)}
table{width:100%;border-collapse:collapse}
th{font-size:0.72rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:0.7rem 1rem;text-align:left;border-bottom:1px solid #222;font-weight:400}
td{padding:0.8rem 1rem;font-size:0.85rem;border-bottom:1px solid #1a1a1a}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:500}
.badge-pending{background:rgba(230,126,34,0.15);color:var(--orange)}
.badge-active{background:rgba(46,204,113,0.15);color:var(--green)}
.badge-completed{background:rgba(52,152,219,0.15);color:var(--blue)}
.badge-rejected{background:rgba(231,76,60,0.15);color:var(--red)}
.action-btns{display:flex;gap:6px}
.btn-sm{padding:3px 10px;border-radius:5px;font-size:0.72rem;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;font-weight:500}
.btn-approve{background:rgba(46,204,113,0.15);color:var(--green)}
.btn-approve:hover{background:rgba(46,204,113,0.3)}
.btn-reject{background:rgba(231,76,60,0.1);color:var(--red)}
.btn-reject:hover{background:rgba(231,76,60,0.25)}
.btn-view{background:rgba(201,168,76,0.1);color:var(--gold)}
.btn-view:hover{background:rgba(201,168,76,0.25)}

.portfolio-card{background:linear-gradient(135deg,#1a1500,#0d0d0d);border:1px solid #3a2f0a;border-radius:14px;padding:2rem;margin-bottom:1.5rem}
.portfolio-amount{font-family:'Playfair Display',serif;font-size:3rem;color:var(--gold)}
.portfolio-meta{display:flex;gap:2rem;margin-top:1.5rem;flex-wrap:wrap}
.pm-item .pm-val{font-size:1.1rem;font-weight:500}
.pm-item .pm-lbl{font-size:0.72rem;color:var(--muted);margin-top:2px}

.invest-card{background:var(--dark2);border:1px solid #2a2a2a;border-radius:12px;padding:1.2rem;margin-bottom:0.8rem}
.ic-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.8rem}
.ic-plan{font-weight:500;font-size:0.95rem}
.ic-amount{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--gold)}
.progress-bar{height:6px;background:#2a2a2a;border-radius:3px;overflow:hidden;margin-bottom:0.5rem}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--green))}
.ic-dates{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--muted)}

.notif{display:flex;align-items:flex-start;gap:0.8rem;padding:0.9rem;background:var(--dark3);border-radius:8px;margin-bottom:0.6rem;border-left:3px solid}
.notif.success{border-color:var(--green)}
.notif.info{border-color:var(--blue)}
.notif.warn{border-color:var(--orange)}
.notif-text{font-size:0.83rem}
.notif-time{font-size:0.72rem;color:var(--muted);margin-top:2px}

.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:center;justify-content:center;padding:1rem}
.modal-ov.open{display:flex}
.modal-box{background:var(--dark2);border:1px solid #333;border-radius:14px;padding:2rem;width:100%;max-width:440px;position:relative;max-height:90vh;overflow-y:auto}
.modal-close{position:absolute;top:1rem;right:1.2rem;background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer}
.modal-box h3{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:1.2rem}
.detail-row{display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid #1e1e1e;font-size:0.88rem}
.detail-row:last-child{border-bottom:none}
.detail-row span:first-child{color:var(--muted)}
.modal-actions{display:flex;gap:0.8rem;margin-top:1.5rem}
.btn-full-approve{flex:1;background:var(--green);color:#000;border:none;padding:0.75rem;border-radius:8px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-full-reject{flex:1;background:var(--red);color:#fff;border:none;padding:0.75rem;border-radius:8px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}

@media(max-width:600px){
  .stats-row{grid-template-columns:1fr 1fr}
  .stat-val{font-size:1.4rem}
  th:nth-child(3),td:nth-child(3),th:nth-child(5),td:nth-child(5){display:none}
  .portfolio-amount{font-size:2.2rem}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">InvestPro</div>
    <div class="login-sub">Connectez-vous à votre espace</div>
    <div class="login-tabs">
      <button class="ltab active" id="tab-admin" onclick="setLoginType('admin')">👑 Admin</button>
      <button class="ltab" id="tab-client" onclick="setLoginType('client')">👤 Investisseur</button>
    </div>
    <input class="inp" type="email" id="loginEmail" placeholder="Email" value="admin@investpro.com">
    <input class="inp" type="password" id="loginPass" placeholder="Mot de passe" value="admin123">
    <button class="btn-gold" onclick="doLogin()">Se connecter</button>
    <div class="demo-hint" id="demoHint">Démo Admin → <strong>admin@investpro.com</strong> / <strong>admin123</strong></div>
    <div style="text-align:center;margin-top:1rem"><a href="index.html" style="font-size:0.8rem;color:var(--muted);text-decoration:none;">← Retour à l'accueil</a></div>
  </div>
</div>

<div id="appScreen">
  <div class="topbar">
    <a href="index.html" class="topbar-logo">InvestPro</a>
    <div class="topbar-right">
      <div class="user-badge">
        <div class="avatar" id="topAvatar" style="background:rgba(231,76,60,0.15);color:var(--red)">A</div>
        <div>
          <div style="font-size:0.85rem" id="topName">Administrateur</div>
          <div class="role-tag role-admin" id="topRole">Admin</div>
        </div>
      </div>
      <button class="btn-logout" onclick="doLogout()">Déconnexion</button>
    </div>
  </div>

  <div class="tabs" id="adminTabs">
    <div class="tab active" onclick="showAdminTab('dashboard')">📊 Tableau de bord</div>
    <div class="tab" onclick="showAdminTab('investments')">💰 Investissements</div>
    <div class="tab" onclick="showAdminTab('clients')">👥 Clients</div>
    <div class="tab" onclick="showAdminTab('withdrawals')">🏦 Retraits</div>
  </div>

  <div class="tabs" id="clientTabs" style="display:none">
    <div class="tab active" onclick="showClientTab('portfolio')">💼 Mon portefeuille</div>
    <div class="tab" onclick="showClientTab('history')">📋 Historique</div>
    <div class="tab" onclick="showClientTab('notifications')">🔔 Notifications</div>
  </div>

  <div class="content" id="mainContent"></div>
</div>

<div class="modal-ov" id="detailModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3 id="modalTitle">Détail</h3>
    <div id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<script>
// ============================================================
// DONNÉES — À remplacer par une vraie base de données
// ============================================================
let investors = [
  {id:'INV-48371',name:'Kodjo Mensah',email:'kodjo@gmail.com',phone:'+228 90 12 34 56',plan:'Pro',amount:2000,rate:18,network:'Flooz',status:'active',date:'2026-03-15',txId:'TXN20260315A4821',gain:360,months:12,progress:25},
  {id:'INV-48372',name:'Akossiwa Dovi',email:'akossiwa@yahoo.fr',phone:'+228 91 45 67 89',plan:'Elite',amount:15000,rate:30,network:'T-Money',status:'pending',date:'2026-04-10',txId:'TXN20260410B9923',gain:4500,months:24,progress:0},
  {id:'INV-48373',name:'Koffi Agbeko',email:'koffi@gmail.com',phone:'+228 90 78 90 12',plan:'Starter',amount:500,rate:8,network:'Flooz',status:'active',date:'2026-02-01',txId:'TXN20260201C3341',gain:40,months:6,progress:75},
  {id:'INV-48374',name:'Ama Tsevi',email:'ama.tsevi@gmail.com',phone:'+228 91 23 45 67',plan:'Pro',amount:5000,rate:18,network:'T-Money',status:'pending',date:'2026-04-12',txId:'TXN20260412D7712',gain:900,months:12,progress:0},
  {id:'INV-48375',name:'Yawo Attivor',email:'yawo@hotmail.com',phone:'+228 90 34 56 78',plan:'Elite',amount:20000,rate:30,network:'Flooz',status:'completed',date:'2026-01-10',txId:'TXN20260110E5591',gain:6000,months:24,progress:100},
  {id:'INV-48376',name:'Sena Fiagbor',email:'sena.f@gmail.com',phone:'+228 91 67 89 01',plan:'Starter',amount:200,rate:8,network:'T-Money',status:'rejected',date:'2026-04-11',txId:'TXN20260411F2201',gain:16,months:6,progress:0},
];
let withdrawals = [
  {id:'WIT-001',name:'Kodjo Mensah',amount:360,method:'Flooz',status:'pending',date:'2026-04-13'},
  {id:'WIT-002',name:'Yawo Attivor',amount:6000,method:'Flooz',status:'approved',date:'2026-04-05'},
  {id:'WIT-003',name:'Koffi Agbeko',amount:30,method:'Flooz',status:'pending',date:'2026-04-12'},
];

let currentRole = 'admin';
let loginType = 'admin';

function setLoginType(type) {
  loginType = type;
  document.getElementById('tab-admin').classList.toggle('active', type==='admin');
  document.getElementById('tab-client').classList.toggle('active', type==='client');
  if(type==='admin'){
    document.getElementById('loginEmail').value='admin@investpro.com';
    document.getElementById('loginPass').value='admin123';
    document.getElementById('demoHint').innerHTML='Démo Admin → <strong>admin@investpro.com</strong> / <strong>admin123</strong>';
  } else {
    document.getElementById('loginEmail').value='kodjo@gmail.com';
    document.getElementById('loginPass').value='invest123';
    document.getElementById('demoHint').innerHTML='Démo Client → <strong>kodjo@gmail.com</strong> / <strong>invest123</strong>';
  }
}

function doLogin() {
  currentRole = loginType;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='flex';
  if(currentRole==='admin'){
    document.getElementById('topName').textContent='Administrateur';
    document.getElementById('topRole').textContent='Admin';
    document.getElementById('topRole').className='role-tag role-admin';
    document.getElementById('topAvatar').textContent='A';
    document.getElementById('topAvatar').style.cssText='background:rgba(231,76,60,0.15);color:var(--red)';
    document.getElementById('adminTabs').style.display='flex';
    document.getElementById('clientTabs').style.display='none';
    showAdminTab('dashboard');
  } else {
    document.getElementById('topName').textContent='Kodjo Mensah';
    document.getElementById('topRole').textContent='Investisseur';
    document.getElementById('topRole').className='role-tag role-client';
    document.getElementById('topAvatar').textContent='KM';
    document.getElementById('topAvatar').style.cssText='background:rgba(201,168,76,0.15);color:var(--gold)';
    document.getElementById('adminTabs').style.display='none';
    document.getElementById('clientTabs').style.display='flex';
    showClientTab('portfolio');
  }
}

function doLogout(){
  document.getElementById('appScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
}

// ===== ADMIN =====
function showAdminTab(tab) {
  document.querySelectorAll('#adminTabs .tab').forEach((t,i)=>{
    t.classList.toggle('active',['dashboard','investments','clients','withdrawals'][i]===tab);
  });
  const c = document.getElementById('mainContent');
  if(tab==='dashboard') c.innerHTML = adminDashboard();
  if(tab==='investments') c.innerHTML = adminInvestments();
  if(tab==='clients') c.innerHTML = adminClients();
  if(tab==='withdrawals') c.innerHTML = adminWithdrawals();
}

function adminDashboard() {
  const total = investors.reduce((s,i)=>s+i.amount,0);
  const active = investors.filter(i=>i.status==='active').length;
  const pending = investors.filter(i=>i.status==='pending').length;
  const gains = investors.reduce((s,i)=>s+i.gain,0);
  return `
  <div class="stats-row">
    <div class="stat-card"><div class="stat-lbl">Capital total géré</div><div class="stat-val">$${total.toLocaleString()}</div><div class="stat-sub up">▲ +12% ce mois</div></div>
    <div class="stat-card"><div class="stat-lbl">Investisseurs actifs</div><div class="stat-val">${active}</div><div class="stat-sub up">▲ +2 nouveaux</div></div>
    <div class="stat-card"><div class="stat-lbl">En attente</div><div class="stat-val" style="color:var(--orange)">${pending}</div><div class="stat-sub" style="color:var(--orange)">⚠ À valider</div></div>
    <div class="stat-card"><div class="stat-lbl">Gains distribués</div><div class="stat-val" style="color:var(--green)">$${gains.toLocaleString()}</div><div class="stat-sub up">▲ Cumulé</div></div>
  </div>
  <div class="table-card">
    <div class="table-header"><div class="table-title">🔴 Paiements en attente de validation</div></div>
    <table><thead><tr><th>Référence</th><th>Investisseur</th><th>Plan</th><th>Montant</th><th>Réseau</th><th>Actions</th></tr></thead><tbody>
    ${investors.filter(i=>i.status==='pending').map(i=>`
      <tr>
        <td style="color:var(--muted);font-size:0.78rem">${i.id}</td>
        <td><div style="font-weight:500">${i.name}</div><div style="font-size:0.75rem;color:var(--muted)">${i.email}</div></td>
        <td><span class="badge badge-pending">${i.plan}</span></td>
        <td style="color:var(--gold);font-weight:500">$${i.amount.toLocaleString()}</td>
        <td>${i.network}</td>
        <td><div class="action-btns">
          <button class="btn-sm btn-approve" onclick="approveInv('${i.id}')">✓ Valider</button>
          <button class="btn-sm btn-reject" onclick="rejectInv('${i.id}')">✗ Rejeter</button>
          <button class="btn-sm btn-view" onclick="viewInv('${i.id}')">Détail</button>
        </div></td>
      </tr>`).join('')}
    </tbody></table>
  </div>`;
}

function adminInvestments() {
  return `
  <div class="table-card">
    <div class="table-header">
      <div class="table-title">Tous les investissements</div>
      <input class="search-inp" placeholder="Rechercher..." oninput="filterTable(this,'invTable')">
    </div>
    <table id="invTable"><thead><tr><th>Référence</th><th>Investisseur</th><th>Plan</th><th>Montant</th><th>Réseau</th><th>Date</th><th>Statut</th><th>Actions</th></tr></thead><tbody>
    ${investors.map(i=>`
      <tr>
        <td style="color:var(--muted);font-size:0.78rem">${i.id}</td>
        <td><div style="font-weight:500">${i.name}</div><div style="font-size:0.75rem;color:var(--muted)">${i.phone}</div></td>
        <td>${i.plan} <span style="color:var(--gold);font-size:0.78rem">${i.rate}%</span></td>
        <td style="color:var(--gold);font-weight:500">$${i.amount.toLocaleString()}</td>
        <td>${i.network}</td>
        <td style="font-size:0.78rem;color:var(--muted)">${i.date}</td>
        <td><span class="badge badge-${i.status}">${{active:'Actif',pending:'En attente',completed:'Terminé',rejected:'Rejeté'}[i.status]}</span></td>
        <td><div class="action-btns">
          ${i.status==='pending'?`<button class="btn-sm btn-approve" onclick="approveInv('${i.id}')">✓</button><button class="btn-sm btn-reject" onclick="rejectInv('${i.id}')">✗</button>`:''}
          <button class="btn-sm btn-view" onclick="viewInv('${i.id}')">Voir</button>
        </div></td>
      </tr>`).join('')}
    </tbody></table>
  </div>`;
}

function adminClients() {
  return `
  <div class="table-card">
    <div class="table-header"><div class="table-title">Base clients</div><input class="search-inp" placeholder="Rechercher..." oninput="filterTable(this,'clientTable')"></div>
    <table id="clientTable"><thead><tr><th>Nom</th><th>Email</th><th>Téléphone</th><th>Plan</th><th>Capital</th><th>Gain annuel</th></tr></thead><tbody>
    ${investors.map(i=>`
      <tr>
        <td style="font-weight:500">${i.name}</td>
        <td style="color:var(--muted);font-size:0.82rem">${i.email}</td>
        <td style="font-size:0.82rem">${i.phone}</td>
        <td><span class="badge badge-${i.status}">${i.plan}</span></td>
        <td style="color:var(--gold)">$${i.amount.toLocaleString()}</td>
        <td style="color:var(--green)">+$${i.gain.toLocaleString()}</td>
      </tr>`).join('')}
    </tbody></table>
  </div>`;
}

function adminWithdrawals() {
  return `
  <div class="table-card">
    <div class="table-header"><div class="table-title">Demandes de retrait</div></div>
    <table><thead><tr><th>Référence</th><th>Investisseur</th><th>Montant</th><th>Méthode</th><th>Date</th><th>Statut</th><th>Actions</th></tr></thead><tbody>
    ${withdrawals.map(w=>`
      <tr>
        <td style="color:var(--muted);font-size:0.78rem">${w.id}</td>
        <td style="font-weight:500">${w.name}</td>
        <td style="color:var(--gold);font-weight:500">$${w.amount.toLocaleString()}</td>
        <td>${w.method}</td>
        <td style="font-size:0.78rem;color:var(--muted)">${w.date}</td>
        <td><span class="badge badge-${w.status==='approved'?'active':'pending'}">${w.status==='approved'?'Approuvé':'En attente'}</span></td>
        <td>${w.status==='pending'?`<div class="action-btns"><button class="btn-sm btn-approve" onclick="alert('Retrait approuvé !')">✓ Payer</button><button class="btn-sm btn-reject" onclick="alert('Retrait rejeté')">✗</button></div>`:'<span style="color:var(--green);font-size:0.78rem">✓ Traité</span>'}</td>
      </tr>`).join('')}
    </tbody></table>
  </div>`;
}

// ===== CLIENT =====
function showClientTab(tab) {
  document.querySelectorAll('#clientTabs .tab').forEach((t,i)=>{
    t.classList.toggle('active',['portfolio','history','notifications'][i]===tab);
  });
  const c = document.getElementById('mainContent');
  if(tab==='portfolio') c.innerHTML = clientPortfolio();
  if(tab==='history') c.innerHTML = clientHistory();
  if(tab==='notifications') c.innerHTML = clientNotifications();
}

function clientPortfolio() {
  const inv = investors[0];
  const gained = Math.round(inv.gain*inv.progress/100);
  const current = inv.amount + gained;
  return `
  <div class="portfolio-card">
    <div style="font-size:0.75rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:0.5rem">Mon capital actuel</div>
    <div class="portfolio-amount">$${current.toLocaleString()}</div>
    <div style="color:var(--green);font-size:0.9rem;margin-top:4px">▲ +$${gained.toLocaleString()} de gains accumulés</div>
    <div class="portfolio-meta">
      <div class="pm-item"><div class="pm-val" style="color:var(--gold)">$${inv.amount.toLocaleString()}</div><div class="pm-lbl">Capital investi</div></div>
      <div class="pm-item"><div class="pm-val" style="color:var(--green)">+$${inv.gain.toLocaleString()}/an</div><div class="pm-lbl">Gain annuel</div></div>

      <div><div class="ic-plan">Plan ${inv.plan} — ${inv.rate}%/an</div><div style="font-size:0.78rem;color:var(--muted)">${inv.id} · ${inv.network}</div></div>
      <div class="ic-amount">$${inv.amount.toLocaleString()}</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${inv.progress}%"></div></div>
    <div class="ic-dates"><span>Démarré le ${inv.date}</span><span>${inv.progress}% écoulé (${Math.round(inv.progress/100*inv.months)}/${inv.months} mois)</span></div>
  </div>
  <div class="invest-card">
    <div class="ic-top">
      <div><div class="ic-plan">Plan Starter — 8%/an</div><div style="font-size:0.78rem;color:var(--muted)">INV-48373 · Flooz</div></div>
      <div class="ic-amount">$500</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:75%"></div></div>

  </div>
  <a href="paiement.html" class="btn-gold" style="display:block;text-align:center;text-decoration:none;margin-top:1rem;padding:0.85rem;border-radius:8px;">+ Nouvel investissement</a>`;
}

  return `
  <div class="table-card">

    <table><thead><tr><th>Référence</th><th>Plan</th><th>Montant</th><th>Date</th><th>Statut</th></tr></thead><tbody>
      <tr><td style="color:var(--muted);font-size:0.78rem">INV-48371</td><td>Pro</td><td style="color:var(--gold)">$2,000</td><td style="font-size:0.78rem;color:var(--muted)">2026-03-15</td><td><span class="badge badge-active">Actif</span></td></tr>
      <tr><td style="color:var(--muted);font-size:0.78rem">INV-48373</td><td>Starter</td><td style="color:var(--gold)">$500</td><td style="font-size:0.78rem;color:var(--muted)">2026-02-01</td><td><span class="badge badge-active">Actif</span></td></tr>

      <tr><td style="font-size:0.78rem;color:var(--muted)">Mars 2026</td><td>Pro</td><td style="color:var(--green)">+$30</td><td>Flooz</td><td><span class="badge badge-active">Versé</span></td></tr>

// ===== ACTIONS =====
function viewInv(id) {
  const inv = investors.find(i=>i.id===id);
  document.getElementById('modalTitle').textContent = 'Dossier ' + id;
  document.getElementById('modalBody').innerHTML = `
    <div class="detail-row"><span>Investisseur</span><span style="font-weight:500">${inv.name}</span></div>
    <div class="detail-row"><span>Email</span><span>${inv.email}</span></div>
    <div class="detail-row"><span>Téléphone</span><span>${inv.phone}</span></div>
    <div class="detail-row"><span>Plan</span><span style="color:var(--gold)">${inv.plan} — ${inv.rate}%/an</span></div>
    <div class="detail-row"><span>Montant</span><span style="color:var(--gold);font-weight:500">$${inv.amount.toLocaleString()}</span></div>
    <div class="detail-row"><span>Réseau</span><span>${inv.network}</span></div>
    <div class="detail-row"><span>ID Transaction</span><span style="font-size:0.82rem;color:var(--muted)">${inv.txId}</span></div>
    <div class="detail-row"><span>Date</span><span>${inv.date}</span></div>
    <div class="detail-row"><span>Gain annuel estimé</span><span style="color:var(--green)">+$${inv.gain.toLocaleString()}</span></div>
    <div class="detail-row"><span>Statut</span><span><span class="badge badge-${inv.status}">${{active:'Actif',pending:'En attente',completed:'Terminé',rejected:'Rejeté'}[inv.status]}</span></span></div>`;
  document.getElementById('modalActions').innerHTML = inv.status==='pending' ? `
    <button class="btn-full-approve" onclick="approveInv('${id}');closeModal()">✓ Valider le paiement</button>
    <button class="btn-full-reject" onclick="rejectInv('${id}');closeModal()">✗ Rejeter</button>` : '';
  document.getElementById('detailModal').classList.add('open');
}

function approveInv(id) {
  const inv = investors.find(i=>i.id===id);
  if(inv){ inv.status='active'; inv.progress=1; }
  const activeTab = document.querySelector('#adminTabs .tab.active');
  showAdminTab(activeTab&&activeTab.textContent.includes('bord')?'dashboard':'investments');
  alert('✅ Investissement validé ! Le client sera notifié.');
}

function rejectInv(id) {
  const inv = investors.find(i=>i.id===id);
  if(inv) inv.status='rejected';
  showAdminTab('investments');
  alert('❌ Investissement rejeté.');
}

function closeModal() { document.getElementById('detailModal').classList.remove('open'); }

function filterTable(inp, tableId) {
  const q = inp.value.toLowerCase();
  document.querySelectorAll('#' + tableId + ' tbody tr').forEach(tr => {
    tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}
</script>
